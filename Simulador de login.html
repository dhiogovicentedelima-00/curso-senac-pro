<!DOCTYPE html>
<html>
  <head>
    <title>Simulador de Login</title>
  </head>
  <body>
    <h2>Login</h2>

    <label>Usuário:</label><br />
    <input type="text" id="usuario" /><br /><br />

    <label>Senha:</label><br />
    <input type="password" id="senha" /><br /><br />

    <button onclick="fazerLogin()">Entrar</button>

    <div id="resultado"></div>

    <script>
      // Usuário e senha corretos definidos no código
      let usuarioCorreto = "admin"
      let senhaCorreta = "123456"

      function fazerLogin() {
        let usuario = document.getElementById("usuario").value
        let senha = document.getElementById("senha").value
        let resultado = document.getElementById("resultado")

        if (usuario === usuarioCorreto && senha === senhaCorreta) {
          resultado.textContent = " Login realizado com sucesso! Bem-vindo, " + usuario + "!"
        } else {
          resultado.textContent = " Usuário ou senha incorretos!"
        }
      }
    </script>
  </body>
</html>
