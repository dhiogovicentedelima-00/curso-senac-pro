<!DOCTYPE html>
<html>
  <head>
    <title>Validação de Formulário</title>
  </head>
  <body>
    <h2>Cadastro</h2>

    <label>Nome:</label><br />
    <input type="text" id="nome" /><br />
    <span id="erroNome"></span><br />

    <label>Email:</label><br />
    <input type="text" id="email" /><br />
    <span id="erroEmail"></span><br />

    <label>Senha:</label><br />
    <input type="password" id="senha" /><br />
    <span id="erroSenha"></span><br />

    <button onclick="validar()">Cadastrar</button>

    <p id="mensagemFinal"></p>

    <script>
      function validar() {
        let nome = document.getElementById("nome").value
        let email = document.getElementById("email").value
        let senha = document.getElementById("senha").value

        let erroNome = document.getElementById("erroNome")
        let erroEmail = document.getElementById("erroEmail")
        let erroSenha = document.getElementById("erroSenha")

        erroNome.textContent = ""
        erroEmail.textContent = ""
        erroSenha.textContent = ""

        let valido = true

        if (nome === "") {
          erroNome.textContent = "⚠️ Nome é obrigatório!"
          valido = false
        } else if (nome.length < 3) {
          erroNome.textContent = "⚠️ Nome deve ter pelo menos 3 letras!"
          valido = false
        }

        if (email === "") {
          erroEmail.textContent = "⚠️ Email é obrigatório!"
          valido = false
        } else if (!email.includes("@")) {
          erroEmail.textContent = "⚠️ Email inválido! Precisa ter @"
          valido = false
        }

        if (senha === "") {
          erroSenha.textContent = "⚠️ Senha é obrigatória!"
          valido = false
        } else if (senha.length < 6) {
          erroSenha.textContent = "⚠️ Senha deve ter pelo menos 6 caracteres!"
          valido = false
        }

        if (valido) {
          document.getElementById("mensagemFinal").textContent = "✅ Cadastro realizado com sucesso!"
        }
      }
    </script>
  </body>
</html>
